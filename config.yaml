# ============================================================
# jproxy 配置文件
# ============================================================

proxy:
  host: "0.0.0.0"
  port: 8000
  api_key: "sk-your-proxy-key"

upstream:
  # 上游 API 地址（OpenAI 兼容格式）
  # 例如: https://api-inference.modelscope.cn
  base_url: "https://api-inference.modelscope.cn"

  # 上游 API Key
  api_key: ""

# 模型列表 — 按优先级排序，数值越小优先级越高
# 最高优先级的先用，遇到 429 自动降级到下一个
models:
  - name: "Qwen/Qwen2.5-72B-Instruct"
    priority: 1
  - name: "Qwen/Qwen2.5-32B-Instruct"
    priority: 2

settings:
  max_retries: 3
  model_review_interval_days: 30
